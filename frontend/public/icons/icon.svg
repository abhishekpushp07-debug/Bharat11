<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#0D0D0D"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B3B"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Cricket Ball Shape -->
  <circle cx="256" cy="256" r="140" fill="url(#red)" stroke="#CC2F2F" stroke-width="4"/>
  
  <!-- Ball Seam -->
  <path d="M 180 180 Q 256 320 332 180" fill="none" stroke="#FFF" stroke-width="8" stroke-linecap="round"/>
  <path d="M 180 332 Q 256 192 332 332" fill="none" stroke="#FFF" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Stitches -->
  <g fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round">
    <line x1="185" y1="195" x2="195" y2="185"/>
    <line x1="205" y1="215" x2="215" y2="205"/>
    <line x1="225" y1="235" x2="235" y2="225"/>
    <line x1="275" y1="235" x2="285" y2="225"/>
    <line x1="295" y1="215" x2="305" y2="205"/>
    <line x1="315" y1="195" x2="325" y2="185"/>
    
    <line x1="185" y1="317" x2="195" y2="327"/>
    <line x1="205" y1="297" x2="215" y2="307"/>
    <line x1="225" y1="277" x2="235" y2="287"/>
    <line x1="275" y1="277" x2="285" y2="287"/>
    <line x1="295" y1="297" x2="305" y2="307"/>
    <line x1="315" y1="317" x2="325" y2="327"/>
  </g>
  
  <!-- "CP" Text -->
  <text x="256" y="276" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#FFF">CP</text>
</svg>
