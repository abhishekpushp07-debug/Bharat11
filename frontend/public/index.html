<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="description" content="Bharat 11 - Fantasy Cricket Prediction Platform. Predict match outcomes, answer 11 questions per match, and win virtual coins!" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bharat 11" />
    <meta name="application-name" content="Bharat 11" />
    <meta name="msapplication-TileColor" content="#0D0D0D" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Fonts - Poppins for UI, Rajdhani for numbers, Noto Sans Devanagari for Hindi -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet" /></noscript>
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <title>Bharat 11 - Fantasy Cricket Prediction</title>
    
    <!-- Splash Screen Colors -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background-color: #0D0D0D;
      }
      
      /* Initial loading state */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(180deg, #0D0D0D 0%, #1A1A1A 100%);
        color: #FF3B3B;
        font-family: 'Orbitron', sans-serif;
      }
      
      .app-loading-logo {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 1rem;
      }
      
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 59, 59, 0.3);
        border-top-color: #FF3B3B;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Bharat 11.</noscript>
    <div id="root">
      <!-- Initial loading state -->
      <div class="app-loading">
        <div class="app-loading-logo">CRICKPREDICT</div>
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(registration) {
              console.log('SW registered:', registration.scope);
            })
            .catch(function(error) {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
