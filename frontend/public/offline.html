<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <title>Offline - Bharat 11</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Rajdhani', 'Inter', sans-serif;
      background: linear-gradient(180deg, #0a0e1a 0%, #131836 100%);
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    
    .offline-icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #0f2744);
      border: 2px solid #1e3a5f88;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: pulse 2s infinite;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #FFD700, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    
    p {
      color: #6b7ba0;
      margin-bottom: 2rem;
      max-width: 300px;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .retry-btn {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .retry-btn:active {
      transform: scale(0.95);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="offline-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
  </div>
  <h1>You're Offline</h1>
  <p>No internet connection. Check your WiFi or mobile data. Your predictions are safe — they'll sync when you're back online!</p>
  <button class="retry-btn" onclick="window.location.reload()">
    Retry Connection
  </button>
</body>
</html>
